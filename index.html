<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP3級 デイリー10問</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&display=swap');

:root{
  --ink:#16382b;
  --paper:#eef4ec;
  --paper2:#dde9dc;
  --accent:#c8451f;
  --accent2:#2f8f5b;
  --gold:#b8923a;
  --line:#c2d6c2;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Zen Kaku Gothic New',sans-serif;
  background:var(--paper);
  background-image:
    radial-gradient(circle at 12% 8%, rgba(47,143,91,.10), transparent 42%),
    radial-gradient(circle at 88% 92%, rgba(22,56,43,.10), transparent 45%),
    linear-gradient(160deg, rgba(47,143,91,.04), transparent 60%);
  color:var(--ink);
  min-height:100vh;
  line-height:1.7;
}
.wrap{max-width:680px;margin:0 auto;padding:0 18px 80px;}

header{
  padding:32px 0 22px;
  border-bottom:2.5px solid var(--ink);
  margin-bottom:24px;
  position:relative;
}
.kicker{
  font-size:11px;letter-spacing:.32em;text-transform:uppercase;
  color:var(--accent);font-weight:700;margin-bottom:6px;
}
h1{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;font-size:clamp(30px,8vw,46px);line-height:.98;
  letter-spacing:-.02em;
}
h1 .jp{
  display:block;font-family:'Zen Kaku Gothic New';font-weight:900;
  font-size:clamp(15px,4vw,19px);letter-spacing:.05em;margin-top:8px;color:var(--ink);
}
.datebar{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-top:14px;font-size:13px;color:#776c5a;
}
.streak{
  font-weight:700;color:var(--accent2);
}

/* progress dots */
.dots{display:flex;gap:6px;margin:18px 0 4px;flex-wrap:wrap;}
.dot{
  width:26px;height:6px;border-radius:3px;background:var(--line);
  transition:.3s;
}
.dot.done{background:var(--accent2);}
.dot.wrong{background:var(--accent);}
.dot.active{background:var(--ink);transform:scaleY(1.6);}

/* card */
.card{
  background:#fbfefb;
  border:2px solid var(--ink);
  border-radius:4px;
  box-shadow:6px 6px 0 var(--ink);
  padding:24px 22px;
  margin-top:22px;
  animation:pop .35s cubic-bezier(.2,.9,.3,1.4);
}
@keyframes pop{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.genre{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  background:var(--ink);color:var(--paper);padding:4px 10px;border-radius:99px;
}
.qnum{font-family:'Bricolage Grotesque';font-weight:800;font-size:13px;color:#9a8d76;}
.qtype{
  font-size:11px;font-weight:700;color:var(--gold);border:1.5px solid var(--gold);
  padding:3px 8px;border-radius:99px;
}
.qtext{font-size:17px;font-weight:500;margin-bottom:18px;}

.opts{display:flex;flex-direction:column;gap:10px;}
.opt{
  border:1.5px solid var(--line);background:var(--paper);
  border-radius:4px;padding:13px 15px;font-size:15px;font-weight:500;
  text-align:left;cursor:pointer;transition:.18s;display:flex;gap:10px;align-items:center;
  font-family:inherit;color:var(--ink);
}
.opt:hover:not(:disabled){border-color:var(--ink);transform:translateX(3px);}
.opt .mk{
  flex:0 0 24px;height:24px;border:1.5px solid var(--line);border-radius:50%;
  display:grid;place-items:center;font-weight:700;font-size:13px;
  font-family:'Bricolage Grotesque';
}
.opt.correct{border-color:var(--accent2);background:rgba(31,107,84,.16);border-width:2.5px;box-shadow:3px 3px 0 var(--accent2);}
.opt.correct .mk{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.opt.wrong{border-color:var(--accent);background:rgba(200,69,31,.14);border-width:2.5px;}
.opt.wrong .mk{background:var(--accent);color:#fff;border-color:var(--accent);}
.opt.dim{opacity:.45;}
.opt:disabled{cursor:default;}
/* 選択肢右端の正誤アイコン */
.opt .tag{margin-left:auto;font-family:'Bricolage Grotesque';font-weight:800;font-size:12px;letter-spacing:.04em;display:none;}
.opt.correct .tag{display:inline;color:var(--accent2);}
.opt.wrong .tag{display:inline;color:var(--accent);}

/* 大きな判定バナー */
.verdict{
  display:none;align-items:center;gap:12px;margin-top:18px;padding:15px 18px;
  border-radius:6px;font-weight:900;font-size:20px;border:2.5px solid;
  font-family:'Zen Kaku Gothic New';
}
.verdict.show{display:flex;animation:slam .4s cubic-bezier(.2,.9,.3,1.5);}
.verdict .ic{
  flex:0 0 40px;height:40px;border-radius:50%;display:grid;place-items:center;
  font-size:24px;color:#fff;font-family:'Bricolage Grotesque';
}
.verdict.ok{background:rgba(31,107,84,.12);border-color:var(--accent2);color:var(--accent2);}
.verdict.ok .ic{background:var(--accent2);}
.verdict.ng{background:rgba(200,69,31,.1);border-color:var(--accent);color:var(--accent);}
.verdict.ng .ic{background:var(--accent);}
@keyframes slam{0%{opacity:0;transform:scale(.8);}60%{transform:scale(1.04);}100%{opacity:1;transform:scale(1);}}

.explain{
  margin-top:16px;padding:14px 15px;border-left:3px solid var(--gold);
  background:var(--paper2);border-radius:0 4px 4px 0;font-size:14px;display:none;
}
.explain.show{display:block;animation:pop .3s;}
.explain b{color:var(--accent);}

.nav{display:flex;gap:12px;margin-top:20px;}
.btn{
  flex:1;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:15px;letter-spacing:.02em;padding:15px;border-radius:4px;
  border:2px solid var(--ink);cursor:pointer;transition:.18s;
}
.btn-primary{background:var(--ink);color:var(--paper);box-shadow:4px 4px 0 var(--accent);}
.btn-primary:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 var(--accent);}
.btn-primary:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--accent);}
.btn-primary:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;transform:none;}

/* result */
.result{text-align:center;padding:30px 22px;}
.score{
  font-family:'Bricolage Grotesque';font-weight:800;
  font-size:clamp(56px,18vw,90px);line-height:1;color:var(--accent);
}
.score span{font-size:30px;color:var(--ink);}
.rmsg{font-size:17px;font-weight:700;margin:8px 0 20px;}
.breakdown{text-align:left;margin:20px 0;font-size:13px;}
.brow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);}
.brow .g{font-weight:500;}
.brow .s{font-family:'Bricolage Grotesque';font-weight:800;}

footer{text-align:center;margin-top:36px;font-size:12px;color:#9a8d76;}
.tip{
  background:var(--paper2);border:1px dashed var(--line);border-radius:4px;
  padding:12px 14px;font-size:12.5px;color:#776c5a;margin-top:24px;line-height:1.6;
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Financial Planner · Grade 3</div>
    <h1>DAILY 10<span class="jp">FP3級 きょうの10問</span></h1>
    <div class="datebar">
      <span id="today"></span>
      <span class="streak" id="streak"></span>
    </div>
  </header>

  <div id="app"></div>

  <div class="tip">
    💡 毎日この問題を出すには、ブラウザでこのページをブックマーク（ホーム画面に追加）しておくと便利ブー。問題は10問ごとにシャッフルされ、進捗と連続記録はこの端末に保存されるブー。
  </div>

  <footer>FP3級 学習アプリ · 全6分野からランダム出題</footer>
</div>

<script>
// ===== 問題データ（全6分野）=====
// type: "ox" = ○×（2択） / "mc" = 3択
const BANK = [
// ── ライフプランニング ──
{g:"ライフ",t:"ox",q:"ファイナンシャル・プランナーが、税理士資格を持たずに顧客の個別具体的な納税額の計算を代行することは、税理士法に抵触しない。",o:["○","×"],a:1,e:"税理士でない者が、有償・無償を問わず個別具体的な税額計算や税務相談を行うことは税理士法違反となるブー。一般的な税制の説明はOK。"},
{g:"ライフ",t:"mc",q:"将来の必要額を、複利運用しながら毎年積み立てる場合、目標額から毎年の積立額を求めるのに使う係数はどれか。",o:["減債基金係数","資本回収係数","年金終価係数"],a:0,e:"減債基金係数は「将来の目標額」から「毎年の積立額」を求める係数ブー。資本回収係数は元本から毎年の取崩額、年金終価係数は毎年の積立から将来額を求める。"},
{g:"ライフ",t:"ox",q:"国民年金の保険料納付済期間が10年以上あれば、原則として老齢基礎年金を受給できる。",o:["○","×"],a:0,e:"老齢基礎年金の受給資格期間は、保険料納付済期間と免除期間などを合算して10年以上が必要ブー。"},
{g:"ライフ",t:"mc",q:"健康保険の傷病手当金は、休業1日につき標準報酬日額の何分の何が支給されるか。",o:["3分の2","2分の1","4分の3"],a:0,e:"傷病手当金は1日につき標準報酬日額の3分の2相当額が、通算1年6か月を限度に支給されるブー。"},
// ── リスク管理 ──
{g:"リスク",t:"ox",q:"生命保険の保険料は、純保険料と付加保険料で構成され、純保険料は予定利率と予定死亡率にもとづいて計算される。",o:["○","×"],a:0,e:"純保険料は予定利率と予定死亡率から、付加保険料は予定事業費率から計算されるブー。"},
{g:"リスク",t:"mc",q:"地震保険は、単独では契約できず、必ずどの保険に付帯して契約する必要があるか。",o:["火災保険","傷害保険","自動車保険"],a:0,e:"地震保険は火災保険に付帯して契約するブー。火災保険だけでは地震・噴火・津波による損害は補償されない。"},
{g:"リスク",t:"ox",q:"自動車損害賠償責任保険（自賠責保険）は、対人賠償・対物賠償の両方を補償の対象としている。",o:["○","×"],a:1,e:"自賠責保険は対人賠償のみが対象ブー。対物賠償は任意保険でカバーする。"},
{g:"リスク",t:"mc",q:"契約者が受け取る生命保険の満期保険金で、契約者と受取人が同一人の場合に課される税金はどれか。",o:["所得税（一時所得）","贈与税","相続税"],a:0,e:"契約者＝受取人なら所得税（一時所得）ブー。契約者と受取人が異なれば贈与税の対象になる。"},
// ── 金融資産運用 ──
{g:"金融",t:"ox",q:"債券の市場金利が上昇すると、既発債券の価格は下落する。",o:["○","×"],a:0,e:"市場金利と債券価格は逆の動きをするブー。金利が上がると既発債の魅力が下がり価格は下落する。"},
{g:"金融",t:"mc",q:"日本国内の預金保険制度（ペイオフ）で、1金融機関ごとに預金者1人あたり保護される元本の上限はいくらか。",o:["1,000万円","500万円","2,000万円"],a:0,e:"ペイオフでは1金融機関・預金者1人あたり元本1,000万円までとその利息が保護されるブー。"},
{g:"金融",t:"ox",q:"株式の投資指標であるPER（株価収益率）は、株価を1株当たり純資産で割って求める。",o:["○","×"],a:1,e:"PERは株価÷1株当たり純利益（EPS）ブー。株価÷1株当たり純資産はPBR（株価純資産倍率）。"},
{g:"金融",t:"mc",q:"複数の異なる値動きの資産に分散投資することで、リスクを低減させる効果を何と呼ぶか。",o:["分散効果","レバレッジ効果","複利効果"],a:0,e:"値動きの異なる資産を組み合わせると全体の値動きが小さくなる分散効果（ポートフォリオ効果）が得られるブー。"},
// ── タックスプランニング ──
{g:"タックス",t:"ox",q:"所得税において、給与所得者は原則として確定申告を行う必要はないが、給与収入が2,000万円を超える場合は確定申告が必要となる。",o:["○","×"],a:0,e:"給与収入2,000万円超の人は年末調整の対象外となり、確定申告が必要ブー。"},
{g:"タックス",t:"mc",q:"所得税の基礎控除は、合計所得金額が2,400万円以下の場合いくらか。",o:["48万円","38万円","65万円"],a:0,e:"基礎控除は合計所得2,400万円以下で48万円ブー。所得が増えると段階的に減り2,500万円超でゼロになる。"},
{g:"タックス",t:"ox",q:"所得税は、1年間の所得を10種類に区分して計算する。",o:["○","×"],a:0,e:"所得税は利子・配当・不動産・事業・給与・退職・山林・譲渡・一時・雑の10種類に区分されるブー。"},
{g:"タックス",t:"mc",q:"医療費控除の対象となるのは、原則として年間の医療費の自己負担額が何円を超えた部分か。",o:["10万円","5万円","20万円"],a:0,e:"医療費控除は原則10万円（または総所得の5%のいずれか低い方）を超えた額が対象ブー。"},
// ── 不動産 ──
{g:"不動産",t:"ox",q:"不動産登記には公信力がないため、登記記録を信じて取引しても法的に完全に保護されるわけではない。",o:["○","×"],a:0,e:"日本の不動産登記に公信力はないブー。登記を信じて取引しても真の権利者でなければ保護されない場合がある。"},
{g:"不動産",t:"mc",q:"建築基準法上、建物の延べ面積の敷地面積に対する割合を何というか。",o:["容積率","建蔽率","斜線率"],a:0,e:"延べ面積÷敷地面積が容積率ブー。建蔽率は建築面積÷敷地面積。"},
{g:"不動産",t:"ox",q:"普通借家契約では、貸主は正当な事由がなくても契約期間満了時に更新を拒絶できる。",o:["○","×"],a:1,e:"普通借家契約では、貸主からの更新拒絶には正当事由が必要ブー。借主保護が手厚い。"},
{g:"不動産",t:"mc",q:"土地・建物を譲渡した際の所得で、所有期間が5年を超えるものは何に区分されるか。",o:["長期譲渡所得","短期譲渡所得","総合譲渡所得"],a:0,e:"譲渡した年の1月1日時点で所有期間5年超なら長期譲渡所得ブー。税率が短期より低い。"},
// ── 相続・事業承継 ──
{g:"相続",t:"ox",q:"相続税の基礎控除額は「3,000万円 + 600万円 × 法定相続人の数」で計算される。",o:["○","×"],a:0,e:"現在の基礎控除は3,000万円＋600万円×法定相続人の数ブー。"},
{g:"相続",t:"mc",q:"贈与税の暦年課税における基礎控除額は、受贈者1人あたり年間いくらか。",o:["110万円","60万円","200万円"],a:0,e:"暦年課税の基礎控除は1人あたり年間110万円ブー。これを超えた部分に贈与税がかかる。"},
{g:"相続",t:"ox",q:"遺言には自筆証書遺言、公正証書遺言、秘密証書遺言の3種類がある。",o:["○","×"],a:0,e:"民法上の普通方式の遺言はこの3種類ブー。公正証書遺言は検認が不要。"},
{g:"相続",t:"mc",q:"配偶者が相続により取得した財産が1億6,000万円以下なら相続税がかからない制度を何というか。",o:["配偶者の税額軽減","小規模宅地等の特例","基礎控除"],a:0,e:"配偶者の税額軽減（配偶者控除）では、1億6,000万円か法定相続分のいずれか多い額まで非課税ブー。"},

// ── ライフプランニング（追加）──
{g:"ライフ",t:"ox",q:"国民年金の第3号被保険者とは、第2号被保険者に扶養される配偶者をいう。",o:["○","×"],a:0,e:"第3号被保険者は、会社員・公務員（第2号）に扶養される20歳以上60歳未満の配偶者ブー。保険料の自己負担はない。"},
{g:"ライフ",t:"mc",q:"教育資金の準備に使われ、契約者貸付など保障も兼ねた保険商品はどれか。",o:["こども保険（学資保険）","終身保険","個人年金保険"],a:0,e:"こども保険（学資保険）は教育資金準備が目的で、契約者死亡時に以後の保険料が免除されるタイプもあるブー。"},
{g:"ライフ",t:"ox",q:"フラット35は、民間金融機関と住宅金融支援機構が提携した全期間固定金利型の住宅ローンである。",o:["○","×"],a:0,e:"フラット35は最長35年の全期間固定金利型ブー。借入時に返済額が確定する。"},
{g:"ライフ",t:"mc",q:"老齢基礎年金を65歳より早く受け取る繰上げ受給では、1か月あたり何％減額されるか。",o:["0.4％","0.7％","1.0％"],a:0,e:"繰上げ受給は1か月あたり0.4％減額ブー。逆に繰下げは1か月0.7％増額される。"},
{g:"ライフ",t:"ox",q:"可処分所得は、年収から所得税・住民税・社会保険料を差し引いた金額である。",o:["○","×"],a:0,e:"可処分所得＝収入－（所得税＋住民税＋社会保険料）ブー。生命保険料などは差し引かない。"},
{g:"ライフ",t:"mc",q:"雇用保険の基本手当を受給するために原則必要な、離職前2年間の被保険者期間はどれか。",o:["通算12か月以上","通算6か月以上","通算24か月以上"],a:0,e:"自己都合退職の場合、離職前2年間に被保険者期間が通算12か月以上必要ブー。"},

// ── リスク管理（追加）──
{g:"リスク",t:"ox",q:"逓減定期保険は、保険期間の経過とともに保険金額が減少していく保険である。",o:["○","×"],a:0,e:"逓減定期保険は保険金額が徐々に減るブー。住宅ローンの残債減少などに合わせやすく保険料が割安。"},

// ===== ロジック =====
const KEY="fp3_progress_v1";
const DAYKEY="fp3_lastday_v1";
const STREAKKEY="fp3_streak_v1";

function todayStr(){const d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// streak管理
(function(){
  const today=todayStr();
  const last=localStorage.getItem(DAYKEY);
  let streak=parseInt(localStorage.getItem(STREAKKEY)||"0");
  if(last!==today){
    const y=new Date();y.setDate(y.getDate()-1);
    const yest=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
    streak=(last===yest)?streak+1:1;
    localStorage.setItem(DAYKEY,today);
    localStorage.setItem(STREAKKEY,streak);
  }
  document.getElementById("streak").textContent="🔥 連続 "+streak+"日";
})();

document.getElementById("today").textContent=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"long"});

// 最近出た問題を避けて10問選ぶ
const SEENKEY="fp3_seen_v1";
function pickQuestions(){
  const withId=BANK.map((q,i)=>({...q,_id:i}));
  let seen=[];
  try{seen=JSON.parse(localStorage.getItem(SEENKEY)||"[]");}catch(e){seen=[];}
  const fresh=withId.filter(q=>!seen.includes(q._id));
  const stale=withId.filter(q=>seen.includes(q._id));
  const pool=shuffle(fresh).concat(shuffle(stale));
  const chosen=pool.slice(0,10);
  const newSeen=chosen.map(q=>q._id).concat(seen).slice(0, Math.floor(BANK.length*0.6));
  localStorage.setItem(SEENKEY,JSON.stringify(newSeen));
  return shuffle(chosen);
}

let quiz=pickQuestions();
let idx=0, answers=[];

const app=document.getElementById("app");

function render(){
  if(idx>=quiz.length){renderResult();return;}
  const item=quiz[idx];
  const dots=quiz.map((_,i)=>{
    let c="dot";
    if(i<idx) c+=answers[i].correct?" done":" wrong";
    if(i===idx) c+=" active";
    return `<div class="${c}"></div>`;
  }).join("");
  app.innerHTML=`
    <div class="dots">${dots}</div>
    <div class="card">
      <div class="qmeta">
        <span class="genre">${item.g}</span>
        <span class="qnum">Q ${idx+1} / 10</span>
        <span class="qtype">${item.t==="ox"?"○×":"3択"}</span>
      </div>
      <div class="qtext">${item.q}</div>
      <div class="opts" id="opts">
        ${item.o.map((o,i)=>`<button class="opt" data-i="${i}"><span class="mk">${item.t==="ox"?o:String.fromCharCode(65+i)}</span><span>${item.t==="ox"?"":o}</span><span class="tag"></span></button>`).join("")}
      </div>
      <div class="verdict" id="verdict"><span class="ic" id="vic"></span><span id="vtxt"></span></div>
      <div class="explain" id="explain"><b>解説</b><br>${item.e}</div>
      <div class="nav">
        <button class="btn btn-primary" id="next" disabled>次へ ›</button>
      </div>
    </div>`;
  document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>pick(parseInt(b.dataset.i)));
  document.getElementById("next").onclick=()=>{idx++;render();};
}

function pick(i){
  const item=quiz[idx];
  const correct=(i===item.a);
  answers[idx]={correct,g:item.g};
  document.querySelectorAll(".opt").forEach((b,bi)=>{
    b.disabled=true;
    if(bi===item.a){b.classList.add("correct");b.querySelector(".tag").textContent="正解";}
    else if(bi===i){b.classList.add("wrong");b.querySelector(".tag").textContent="あなたの回答";}
    else{b.classList.add("dim");}
  });
  const v=document.getElementById("verdict");
  v.className="verdict show "+(correct?"ok":"ng");
  document.getElementById("vic").textContent=correct?"✓":"✕";
  document.getElementById("vtxt").textContent=correct?"正解！":"不正解…";
  document.getElementById("explain").classList.add("show");
  document.getElementById("next").disabled=false;
  document.getElementById("next").textContent=(idx===quiz.length-1)?"結果を見る ›":"次へ ›";
}

function renderResult(){
  const score=answers.filter(a=>a.correct).length;
  const genres={};
  answers.forEach(a=>{genres[a.g]=genres[a.g]||{c:0,t:0};genres[a.g].t++;if(a.correct)genres[a.g].c++;});
  let msg = score>=9?"素晴らしいブー！合格ラインを軽々突破！":
            score>=6?"いい調子ブー！この調子で復習を続けよう":
            "まだ伸びしろたっぷりブー。解説をしっかり読み返そう";
  const rows=Object.entries(genres).map(([g,v])=>
    `<div class="brow"><span class="g">${g}</span><span class="s">${v.c}/${v.t}</span></div>`).join("");
  app.innerHTML=`
    <div class="card result">
      <div class="score">${score}<span>/10</span></div>
      <div class="rmsg">${msg}</div>
      <div class="breakdown">${rows}</div>
      <div class="nav">
        <button class="btn btn-primary" onclick="restart()">もう10問やる ›</button>
      </div>
    </div>`;
}

function restart(){quiz=pickQuestions();idx=0;answers=[];render();}
window.restart=restart;

render();
</script>
